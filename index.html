<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manishion - Coming Soon</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />
    <style>
        /* 기본 설정: 화면 전체를 채우고 중앙 정렬 */
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #ffffff; /* 전체 배경색은 흰색 유지 */
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            text-align: center;
            word-break: keep-all; 
        }

        .container {
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
        }

        /* 로고 이미지 반응형 처리 */
        .logo {
            max-width: 320px; 
            width: 100%;
            height: auto;
            margin-bottom: 50px; 
        }

        /* ✨수정된 부분: COMING SOON 텍스트 스타일 (블랙 박스 디자인) */
        .title {
            font-size: 1.6rem;
            font-weight: 700;
            color: #ffffff; /* 글자색: 흰색 */
            background-color: #111111; /* 배경색: 검은색 */
            display: inline-block; /* 글자 길이에 맞춰 배경 박스 생성 */
            padding: 12px 24px; /* 박스 안쪽 여백 */
            letter-spacing: 0.2em; /* 자간 넓게 */
            margin: 0 0 25px 0;
            border-radius: 4px; /* 모서리 살짝 둥글게 */
            /* 시각적 중앙 정렬 보정 */
            margin-right: -0.2em; 
        }

        /* 서브 텍스트 스타일 */
        .subtitle {
            font-size: 1.3rem;
            font-weight: 400;
            color: #555555; 
            margin: 0;
        }

        .subtitle strong {
            font-weight: 700;
            color: #333333;
        }

        /* 하단 문의처 텍스트 스타일 */
        .contact {
            font-size: 0.95rem;
            color: #888888; 
            margin-top: 40px; 
        }

        /* 모바일 화면을 위한 반응형 스타일 */
        @media (max-width: 600px) {
            .logo {
                max-width: 240px;
                margin-bottom: 40px;
            }
            .title {
                font-size: 1.3rem;
                padding: 10px 20px;
            }
            .subtitle {
                font-size: 1.05rem;
            }
            .contact {
                font-size: 0.85rem;
                margin-top: 30px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="Manishion.png" alt="Manishion" class="logo">
        
        <div>
            <h1 class="title">COMING SOON</h1>
        </div>
        <p class="subtitle">새로운 <strong>Manishion</strong>을 준비하고 있습니다.</p>
        
        <p class="contact">[관련 문의 : 010-3425-3199]</p>
    </div>

</body>
</html>
